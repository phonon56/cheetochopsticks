# Pikes Peak Regional Emergency Operations Plan — page assets.
#
# Add this library to a node template, block, or paragraph that renders
# the EOP page. The CSS and JS are namespaced under .eop-page so they
# will not leak into the surrounding theme.
#
# Attach in Twig:
#   {{ attach_library('pikes_peak_eop/eop') }}
#
# Or from a render array (preprocess):
#   $variables['#attached']['library'][] = 'pikes_peak_eop/eop';

eop:
  version: 1.0.0
  css:
    theme:
      pikes-peak-eop.css: {}
  js:
    pikes-peak-eop.js: {}
  dependencies:
    - core/drupal
    - core/once
