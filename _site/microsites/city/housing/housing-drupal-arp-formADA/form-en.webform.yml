# Drupal Webform configuration: HOME-ARP Allocation Plan — Public Comment
# =============================================================================
# Place this file at:
#   sites/default/files/config_<hash>/sync/webform.webform.home_arp_comment.yml
# OR import via Admin > Configuration > Development > Configuration synchronization
# OR import via the Webform UI at /admin/structure/webform → "+ Add webform"
#   then "Source" tab and paste this file's contents.
#
# After import, edit the two CHANGE-ME values in the handlers section:
#   1. completed_url       (the JSON webhook URL)
#   2. to_mail              (the staff notification email recipient)
# Optionally set a webhook signing secret in custom_options.
#
