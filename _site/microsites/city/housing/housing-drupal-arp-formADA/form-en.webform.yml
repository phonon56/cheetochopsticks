id: home_arp_comment
title: 'HOME-ARP Allocation Plan — Public Comment'
description: 'Submit a public comment on the City of Colorado Springs HOME-ARP Allocation Plan amendment. Comment period is April 24 through May 26, 2026.'
categories:
  - 'Public Participation'
elements: |
  intro:
    '#type': webform_markup
    '#markup': |
      <h2>About this form</h2>
      <p>The City of Colorado Springs is collecting public comment on a proposed amendment to its HOME-ARP Allocation Plan. The public comment period is open from <strong>April 24 through May 26, 2026</strong>.</p>
      <p>You can submit comments through this form, or by any of the following methods. All methods enter the public record on equal footing.</p>
      <ul>
        <li><strong>Email:</strong> CityHousingAndCommunityVitality@coloradosprings.gov</li>
        <li><strong>Phone:</strong> 719-385-5859 (TTY users may dial 711 for relay)</li>
        <li><strong>Postal mail:</strong> Housing and Homelessness Response, 30 S. Nevada Ave., Colorado Springs, CO 80903</li>
        <li><strong>In person:</strong> at any scheduled public hearing during the comment period</li>
      </ul>
      <p>If you need this form, the draft amendment, or any city document in another format (large print, Braille, ASL, audio, plain language, or another language), please tell us in the "Accessibility request" section at the bottom of this form, or contact the Office of Accessibility at 719-385-5169.</p>
      <p>All fields except your comment are optional. We collect contact information only to follow up if you ask us to.</p>

  about_you:
    '#type': fieldset
    '#title': 'About you'
    '#description': 'All fields in this section are optional.'
    name:
      '#type': textfield
      '#title': 'Your name'
      '#description': 'Provide a name only if you are comfortable having it associated with your comment in the public record.'
      '#maxlength': 255
      '#autocomplete': 'name'
    email:
      '#type': email
      '#title': 'Email address'
      '#description': 'We will only use this to follow up if you ask us to.'
      '#autocomplete': 'email'
    phone:
      '#type': tel
      '#title': 'Phone number'
      '#description': 'Optional. Include if you would like a phone follow-up.'
      '#autocomplete': 'tel'
    zip:
      '#type': textfield
      '#title': 'ZIP code'
      '#description': 'Helps us understand which neighborhoods are weighing in.'
      '#maxlength': 10
      '#size': 10
      '#autocomplete': 'postal-code'
    submitter_role:
      '#type': radios
      '#title': 'I am submitting this comment as'
      '#description': 'Choose the description that best fits.'
      '#options':
        resident: 'A resident of Colorado Springs'
        qualifying_population: 'Someone who would qualify for HOME-ARP services (homeless, at risk of homelessness, fleeing violence, or other vulnerable population)'
        service_provider: 'A service provider or housing professional'
        advocate: 'An advocate or community organization representative'
        elected_official: 'An elected or appointed official'
        other: 'Other'
    submitter_role_other:
      '#type': textfield
      '#title': 'Please describe'
      '#states':
        visible:
          ':input[name="submitter_role"]':
            value: other
        required:
          ':input[name="submitter_role"]':
            value: other
    organization:
      '#type': textfield
      '#title': 'Organization (if applicable)'
      '#description': 'Only if you are commenting on behalf of an organization.'
      '#states':
        visible:
          - ':input[name="submitter_role"]':
              value: service_provider
          - or
          - ':input[name="submitter_role"]':
              value: advocate
          - or
          - ':input[name="submitter_role"]':
              value: elected_official

  comment_topics:
    '#type': fieldset
    '#title': 'What is your comment about?'
    '#description': 'Select all that apply. This helps us route your comment to the right team.'
    topics:
      '#type': checkboxes
      '#title': 'Topics'
      '#title_display': invisible
      '#options':
        affordable_rental: 'Production of affordable rental housing'
        tbra: 'Tenant-Based Rental Assistance (TBRA)'
        supportive_services: 'Supportive services'
        non_congregate_shelter: 'Non-congregate shelter'
        allocation: 'How funds are allocated across activities'
        eligible_activities: 'Eligible activities and qualifying populations'
        public_participation: 'The public participation process itself'
        other: 'Other'
    topic_other:
      '#type': textfield
      '#title': 'Please describe the other topic'
      '#states':
        visible:
          ':input[name="topics[other]"]':
            checked: true
        required:
          ':input[name="topics[other]"]':
            checked: true

  comment_section:
    '#type': fieldset
    '#title': 'Your comment'
    comment:
      '#type': textarea
      '#title': 'Comment'
      '#title_display': invisible
      '#description': 'Please share your comment, question, or suggestion. There is no length limit, but more focused comments are easier to act on.'
      '#required': true
      '#rows': 8
      '#counter_type': character
      '#counter_maximum_message': '@count characters'
    attachment:
      '#type': managed_file
      '#title': 'Supporting document (optional)'
      '#description': 'Attach a letter, data, or supporting document. Accepted formats: PDF, Word, plain text, JPG, PNG. Maximum 10 MB.'
      '#max_filesize': '10'
      '#file_extensions': 'pdf doc docx odt txt rtf jpg jpeg png'

  follow_up:
    '#type': fieldset
    '#title': 'Follow-up'
    contact_back:
      '#type': checkbox
      '#title': 'Yes, please contact me about my comment'
      '#description': 'If checked, the team may reach out using the contact information you provided.'
      '#states':
        visible:
          - ':input[name="email"]':
              filled: true
          - or
          - ':input[name="phone"]':
              filled: true
    newsletter:
      '#type': checkbox
      '#title': 'Add me to the Housing & Community Vitality newsletter'
      '#description': 'Occasional updates from the Housing and Homelessness Response Department. You can unsubscribe at any time.'
      '#states':
        visible:
          ':input[name="email"]':
            filled: true

  accessibility_request:
    '#type': fieldset
    '#title': 'Accessibility request'
    '#description': 'If you need this form, the draft plan, or city documents in another format, tell us here. The Office of Accessibility will follow up.'
    needs_alternate_format:
      '#type': checkbox
      '#title': 'I need an alternate format or accommodation'
    format_needed:
      '#type': textarea
      '#title': 'What format or accommodation do you need?'
      '#description': 'For example: large print, Braille, ASL interpretation, plain-language summary, Spanish translation, audio, or any other accommodation.'
      '#rows': 3
      '#states':
        visible:
          ':input[name="needs_alternate_format"]':
            checked: true
        required:
          ':input[name="needs_alternate_format"]':
            checked: true

  privacy:
    '#type': webform_markup
    '#markup': |
      <p><small><strong>Privacy notice.</strong> Comments submitted through this form become part of the public record for the HOME-ARP Allocation Plan amendment. Personal information you provide (name, contact details) is used only to follow up if you ask us to. Your comment will be summarized in the city's response to public comment, which is published with the final plan. The full submission is retained by the Housing and Homelessness Response Department in accordance with the city's records retention schedule.</small></p>

