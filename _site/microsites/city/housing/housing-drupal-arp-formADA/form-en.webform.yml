handlers:

  # ---------------------------------------------------------------------------
  # Handler 1: JSON webhook (remote_post)
  # POSTs every submission as JSON to the configured URL.
  # CHANGE the completed_url and (optionally) custom_options below.
  # ---------------------------------------------------------------------------
  json_webhook:
    id: remote_post
    handler_id: json_webhook
    label: 'JSON webhook to record system'
    notes: 'Posts each submission as JSON to the city record system. Configure URL and shared secret in settings.'
    status: true
    conditions: {  }
    weight: 0
    settings:
      method: POST
      type: json
      excluded_data:
        - serial
        - sid
        - token
        - uri
        - request_uri
        - request_user_agent
        - request_remote_addr
        - in_draft
        - current_page
      custom_data: ''
      custom_options: |
        headers:
          X-Webform-Source: 'cos-home-arp-comment'
          X-Webform-Secret: 'CHANGE-ME-set-shared-secret-or-rotate-via-key-module'
      custom_response_message: ''
      custom_response_messages: {  }
      completed_url: 'https://CHANGE-ME.example.gov/webhook/home-arp-comment'
      completed_custom_data: ''
      updated_url: ''
      updated_custom_data: ''
      deleted_url: ''
      deleted_custom_data: ''
      draft_created_url: ''
      draft_created_custom_data: ''
      draft_updated_url: ''
      draft_updated_custom_data: ''
      converted_url: ''
      converted_custom_data: ''
      debug: false
      cast: true
      file_data: false
      error_url: ''
      error_message: 'There was a problem submitting your comment. Please try again or use one of the alternative submission methods listed at the top of this form.'

  # ---------------------------------------------------------------------------
  # Handler 2: Email notification to Housing & Community Vitality
  # CHANGE the to_mail below if a different recipient is preferred.
  # ---------------------------------------------------------------------------
  email_notification:
    id: email
    handler_id: email_notification
    label: 'Email to Housing & Community Vitality'
    notes: 'Sends a plain-text notification email to staff for each submission.'
    status: true
    conditions: {  }
    weight: 1
    settings:
      states:
        - completed
      to_mail: 'CityHousingAndCommunityVitality@coloradosprings.gov'
      to_options: {  }
      bcc_mail: ''
      bcc_options: {  }
      cc_mail: ''
      cc_options: {  }
      from_mail: '[site:mail]'
      from_options: {  }
      from_name: '[site:name]'
      reply_to: '[webform_submission:values:email:raw]'
      return_path: ''
      sender_mail: ''
      sender_name: ''
      subject: 'New HOME-ARP comment received [#[webform_submission:serial]]'
      body: |
        A new comment has been submitted on the HOME-ARP Allocation Plan amendment.

        Submission ID: [webform_submission:serial]
        Submitted: [webform_submission:created]
        Language: [webform_submission:langcode]

        ----------------------------------------------------------------------
        SUBMITTER
        ----------------------------------------------------------------------
        Name: [webform_submission:values:name]
        Email: [webform_submission:values:email]
        Phone: [webform_submission:values:phone]
        ZIP: [webform_submission:values:zip]
        Submitting as: [webform_submission:values:submitter_role]
        Organization: [webform_submission:values:organization]

        ----------------------------------------------------------------------
        TOPICS
        ----------------------------------------------------------------------
        [webform_submission:values:topics]

        ----------------------------------------------------------------------
        COMMENT
        ----------------------------------------------------------------------
        [webform_submission:values:comment]

        ----------------------------------------------------------------------
        FOLLOW-UP
        ----------------------------------------------------------------------
        Wants follow-up: [webform_submission:values:contact_back]
        Newsletter: [webform_submission:values:newsletter]

        ----------------------------------------------------------------------
        ACCESSIBILITY REQUEST
        ----------------------------------------------------------------------
        Needs alternate format: [webform_submission:values:needs_alternate_format]
        Format needed: [webform_submission:values:format_needed]

        View the full submission with attachments:
        [webform_submission:url]
      excluded_elements: {  }
      ignore_access: false
      exclude_empty: true
      exclude_empty_checkbox: false
      exclude_attachments: false
      html: false
      attachments: true
      twig: false
      debug: false
      theme_name: ''
      parameters: {  }

  # ---------------------------------------------------------------------------
  # Handler 3: Accessibility request side-channel (only fires when the
  # accommodation checkbox is checked; routes to the Office of Accessibility)
  # ---------------------------------------------------------------------------
  accessibility_routing:
    id: email
    handler_id: accessibility_routing
    label: 'Accessibility request to Office of Accessibility'
    notes: 'Conditional notification when an accommodation is requested, with five-business-day SLA expectation.'
    status: true
    conditions:
      enabled:
        ':input[name="needs_alternate_format"]':
          checked: true
    weight: 2
    settings:
      states:
        - completed
      to_mail: 'CHANGE-ME-office-of-accessibility@coloradosprings.gov'
      from_mail: '[site:mail]'
      from_name: '[site:name]'
      reply_to: '[webform_submission:values:email:raw]'
      subject: 'Accommodation request from HOME-ARP comment form [#[webform_submission:serial]]'
      body: |
        An accommodation has been requested via the HOME-ARP public comment form.

        Submission ID: [webform_submission:serial]
        Submitted: [webform_submission:created]
        Language: [webform_submission:langcode]

        Format / accommodation needed:
        [webform_submission:values:format_needed]

        Requestor (if provided):
        Name: [webform_submission:values:name]
        Email: [webform_submission:values:email]
        Phone: [webform_submission:values:phone]
        ZIP: [webform_submission:values:zip]

        Per city policy, the Office of Accessibility should follow up within five business days.

        Full submission:
        [webform_submission:url]
      excluded_elements: {  }
      ignore_access: false
      exclude_empty: true
      exclude_empty_checkbox: true
      html: false
      attachments: false
      twig: false
      debug: false

