<!doctype html>
<html lang="en">

    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <title>Contact the City — Colorado Springs</title>

    <!-- Cloudflare Turnstile, loaded once at page level so the React widget
         renders without waiting on a dynamic script load. Site key is fetched
         at runtime from /api/turnstile-config; the widget only renders if the
         server returns a valid key (i.e. wrangler.jsonc has been configured). -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
